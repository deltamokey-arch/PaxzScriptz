<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paxz Scriptz</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --bg: #050505; 
            --accent: #8a2be2; 
            --accent-glow: rgba(138, 43, 226, 0.4); 
            --text: #ffffff; 
            --text-dim: #a0a0a0; 
        }

        * { box-sizing: border-box; }

        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; 
            overflow: hidden; /* Zorgt dat scrollen niet nodig is */
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* Navigatie compacter */
        nav { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 10px 8%; 
            background: rgba(0,0,0,0.9); 
            border-bottom: 1px solid #1a1a1a; 
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .logo { font-size: 20px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; text-shadow: 0 0 5px rgba(138, 43, 226, 0.3); transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        .logo span { color: var(--accent); animation: glow 3s ease-in-out infinite; }
        .logo span { color: var(--accent); animation: glow 3s ease-in-out infinite; }

        .nav-links a { 
            color: var(--text-dim); 
            text-decoration: none; 
            margin-left: 20px; 
            font-size: 12px; 
            font-weight: 600; 
            text-transform: uppercase; 
            transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .nav-links a i { margin-right: 5px; }

        /* Hero Sectie volledig herschaald */
        .hero { 
            flex-grow: 1;
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            text-align: center; 
            padding: 20px; 
            background: linear-gradient(-45deg, #11051a, #050505, #1a0b2e, #0a0a0a); 
            background-size: 400% 400%;
            animation: bgShift 20s ease infinite;
        }

        .status-bar {
            font-size: 10px;
            letter-spacing: 1px;
            color: #00ff00;
            margin-bottom: 15px;
            background: rgba(0, 255, 0, 0.05);
            padding: 5px 12px;
            border-radius: 50px;
            border: 1px solid rgba(0, 255, 0, 0.2);
        }

        .pulsating-dot {
            height: 6px;
            width: 6px;
            background-color: #00ff00;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            box-shadow: 0 0 8px #00ff00;
            animation: pulse 1.5s infinite;
        }

        /* Titel verkleind (Was te lomp op image_46ab05.jpg) */
        .hero h1 { 
            font-size: 3.5rem; 
            margin: 0; 
            font-weight: 900; 
            letter-spacing: -1px; 
            text-shadow: 0 0 20px rgba(138, 43, 226, 0.5);
        }

        .hero h1 span { 
            background: linear-gradient(to right, #fff, var(--accent)); 
            background-clip: text;
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }

        /* Subtext verkleind */
        .hero-subtext { 
            color: #e0e0e0; 
            font-size: 1.1rem; 
            margin: 15px 0 5px; 
        }

        .highlight {
            color: var(--accent);
            font-weight: bold;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Badge compacter */
        .security-badge {
            margin-top: 15px;
            font-size: 11px;
            color: #888;
            background: rgba(255, 255, 255, 0.03);
            padding: 8px 15px;
            border-radius: 8px;
            border: 1px dashed #333;
        }

        /* Knoppen compacter gemaakt */
        .btn-container {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .btn { 
            background: var(--accent); 
            color: white; 
            padding: 14px 45px; 
            border-radius: 6px; 
            text-decoration: none; 
            font-weight: 800; 
            transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94); 
            text-transform: uppercase; 
            font-size: 15px;
        }

        .btn:hover { 
            transform: translateY(-2px) scale(1.05); 
            box-shadow: 0 8px 20px var(--accent-glow); 
        }

        .btn-discord {
            background: #5865F2;
            color: white;
            text-decoration: none;
            font-weight: 600;
            padding: 8px 20px;
            border-radius: 5px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .btn-discord:hover { background: #4752c4; transform: scale(1.05); }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.5; }
            100% { transform: scale(0.9); opacity: 1; }
        }

        @keyframes bgShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes glow {
            0% { text-shadow: 0 0 5px rgba(138, 43, 226, 0.3); }
            50% { text-shadow: 0 0 20px rgba(138, 43, 226, 0.8); }
            100% { text-shadow: 0 0 5px rgba(138, 43, 226, 0.3); }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Paxz<span>Scriptz</span></div>
        <div class="nav-links">
            <a href="index.html"><i class="fas fa-home"></i> Home</a>
            <a href="scripts.html"><i class="fas fa-code"></i> Scripts</a>
            <a href="executors.html"><i class="fas fa-list"></i> Executors</a>
        </div>
    </nav>

    <section class="hero">
        <div class="status-bar">
            <span class="pulsating-dot"></span> SYSTEM STATUS: OPERATIONAL
        </div>
        
        <h1>Paxz <span>Scriptz</span></h1>
        
        <p class="hero-subtext">
            Best undetected high-quality <b>Stealer + Auto-Joiner</b>.
        </p>
        <span class="highlight">Engineered for performance, built for results.</span>

        <div class="security-badge">
            <i class="fas fa-shield-alt"></i> 100% Clean • 0% Dualhook Guaranteed
        </div>

        <div class="btn-container">
            <a href="scripts.html" class="btn">Configure Now!</a>
            
            <a href="https://discord.gg/6yr2acGdgm" target="_blank" class="btn-discord">
                <i class="fab fa-discord"></i> Join Paxz Scriptz
            </a>
        </div>
    </section>

</body>
</html>
